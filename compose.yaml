# Docker Compose / Podman Compose configuration
# Works with both `docker compose` and `podman-compose`

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_SITE_URL=${NEXT_PUBLIC_SITE_URL:-http://localhost:3000}
    image: bandland:latest
    container_name: bandland
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_SITE_URL=${NEXT_PUBLIC_SITE_URL:-http://localhost:3000}
      - ADMIN_PASSWORD_HASH=${ADMIN_PASSWORD_HASH:-}
      - AUTH_SECRET=${AUTH_SECRET:-}
      - AUTH_URL=${AUTH_URL:-http://localhost:3000}
      - CONTENT_DIR=/data/content
      - CONTENT_HISTORY_DIR=/data/content/.history
      - MEDIA_DIR=/data/media
      - MEDIA_HISTORY_DIR=/data/media/.history
      - AUTH_RATE_LIMIT_DIR=/data/auth-rate-limit
    volumes:
      - bandland-content:/data/content
      - bandland-media:/data/media
      - bandland-rate-limit:/data/auth-rate-limit
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://localhost:3000/api/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1))",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Development service (alternative)
  dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
      args:
        - NEXT_PUBLIC_SITE_URL=${NEXT_PUBLIC_SITE_URL:-http://localhost:3000}
    image: bandland:dev
    container_name: bandland-dev
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_SITE_URL=${NEXT_PUBLIC_SITE_URL:-http://localhost:3000}
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
      - bandland-dev-media:/app/content/media
    command: npm run dev
    profiles:
      - dev

volumes:
  bandland-content:
  bandland-media:
  bandland-rate-limit:
  bandland-dev-media:
